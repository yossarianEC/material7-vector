<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Material 7 Studio</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1115;
      color: #f4f0fa;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      grid-template-rows: 1fr auto;
      background:
        radial-gradient(circle at 50% 25%, rgba(126, 87, 194, 0.2), transparent 36rem),
        #0f1115;
    }

    main {
      display: grid;
      place-content: center;
      padding: 2rem;
      text-align: center;
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(2.5rem, 7vw, 5rem);
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0;
      color: #c9c3d2;
      font-size: 1.05rem;
    }

    footer {
      padding: 1.5rem;
      color: #918a9b;
      font-size: 0.8rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <main>
    <div>
      <h1>Material 7 Studio</h1>
      <p>Studio system rebuild in progress.</p>
    </div>
  </main>
  <footer>Material 7 · Studio</footer>
</body>
</html>
