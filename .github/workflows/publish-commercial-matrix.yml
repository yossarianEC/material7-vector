name: Publish Commercial Matrix

on:
  workflow_dispatch:
    inputs:
      CLIENTE:
        description: "Client or brand name"
        required: true
        type: string
      PROYECTO:
        description: "Project or campaign name"
        required: true
        type: string
      FECHA:
        description: "Matrix date in YYYY-MM-DD format"
        required: true
        type: string
      RESUMEN_CORTO:
        description: "Short commercial matrix summary"
        required: true
        type: string
      AUDIENCIA:
        description: "Primary target audience"
        required: true
        type: string
      EDAD_SUGERIDA:
        description: "Suggested age range"
        required: true
        type: string
      INTRO_01:
        description: "First approved intro line"
        required: true
        type: string
      INTRO_02:
        description: "Second approved intro line"
        required: true
        type: string
      INTRO_03:
        description: "Third approved intro line"
        required: true
        type: string
      BENEFICIO_01:
        description: "First approved benefit line"
        required: true
        type: string
      BENEFICIO_02:
        description: "Second approved benefit line"
        required: true
        type: string
      BENEFICIO_03:
        description: "Third approved benefit line"
        required: true
        type: string
      CTA_01:
        description: "First approved CTA line"
        required: true
        type: string
      CTA_02:
        description: "Second approved CTA line"
        required: true
        type: string
      CTA_03:
        description: "Third approved CTA line"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Render commercial matrix HTML
        id: render
        env:
          CLIENTE: ${{ inputs.CLIENTE }}
          PROYECTO: ${{ inputs.PROYECTO }}
          FECHA: ${{ inputs.FECHA }}
          RESUMEN_CORTO: ${{ inputs.RESUMEN_CORTO }}
          AUDIENCIA: ${{ inputs.AUDIENCIA }}
          EDAD_SUGERIDA: ${{ inputs.EDAD_SUGERIDA }}
          INTRO_01: ${{ inputs.INTRO_01 }}
          INTRO_02: ${{ inputs.INTRO_02 }}
          INTRO_03: ${{ inputs.INTRO_03 }}
          BENEFICIO_01: ${{ inputs.BENEFICIO_01 }}
          BENEFICIO_02: ${{ inputs.BENEFICIO_02 }}
          BENEFICIO_03: ${{ inputs.BENEFICIO_03 }}
          CTA_01: ${{ inputs.CTA_01 }}
          CTA_02: ${{ inputs.CTA_02 }}
          CTA_03: ${{ inputs.CTA_03 }}
        run: node "Vector - Shotlist system/scripts/publish-commercial-matrix.js"

      - name: Commit generated commercial matrix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${{ steps.render.outputs.file_path }}"

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Publish commercial matrix: ${{ steps.render.outputs.file_path }}"
          git push

      - name: Summary
        run: |
          echo "Status: ${{ steps.render.outputs.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "File: ${{ steps.render.outputs.file_path }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Message: ${{ steps.render.outputs.message }}" >> "$GITHUB_STEP_SUMMARY"
